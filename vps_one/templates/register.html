<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>注册｜VPS-ONE</title><link rel="stylesheet" href="/static/app.css"></head><body><main class="container"><section class="auth card"><a class="brand" href="/"><b>VPS</b>-ONE</a><h1>创建账户</h1>{% if error %}<div class="alert">{{error}}</div>{% endif %}<form method="post"><label class="field">邮箱<input name="email" type="email" required autocomplete="email"></label><label class="field">密码<input name="password" type="password" minlength="10" required autocomplete="new-password"></label><button class="btn">注册</button></form><p>已有账户？<a href="/login">返回登录</a></p></section></main></body></html>
