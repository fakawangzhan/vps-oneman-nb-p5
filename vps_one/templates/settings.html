<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>系统配置｜VPS-ONE</title><link rel="stylesheet" href="/static/app.css"></head><body><div class="admin-shell"><aside class="sidebar"><div class="brand"><b>VPS</b>-ONE</div><nav><a href="/admin">运营总览</a><a href="/admin/plans">套餐管理</a><a class="active" href="/admin/settings">系统配置</a><a href="/">返回商城</a></nav></aside><main class="content"><div class="eyebrow">SETTINGS</div><h1>系统与集成配置</h1>{% if saved %}<div class="alert">配置已保存或测试通过</div>{% endif %}<form class="settings-stack" method="post"><input type="hidden" name="csrf" value="{{csrf}}"><section class="card"><h2>网站基础信息</h2><div class="form-grid"><label class="field">网站名称<input name="site_name" value="{{values.site_name}}"></label><label class="field">网站副标题<input name="site_tagline" value="{{values.site_tagline}}"></label><label class="field wide">页脚文案<input name="site_footer" value="{{values.site_footer}}"></label></div></section><section class="card"><h2>CLICD</h2><div class="form-grid"><label class="field wide">API 地址<input name="clicd_base_url" value="{{values.clicd_base_url}}" placeholder="https://panel.example.com"></label><label class="field wide">API Key<input type="password" name="clicd_token" placeholder="留空保留现值"></label></div></section><section class="card"><h2>HashPay 与 EdgeKey</h2><div class="form-grid"><label class="field">HashPay 地址<input name="hashpay_base_url" value="{{values.hashpay_base_url}}"></label><label class="field">商户 ID<input name="hashpay_merchant_id" value="{{values.hashpay_merchant_id}}"></label><label class="field wide">商户 RSA 私钥<textarea name="hashpay_private_key" rows="5" placeholder="留空保留现值"></textarea></label><label class="field wide">HashPay RSA 公钥<textarea name="hashpay_public_key" rows="5" placeholder="留空保留现值"></textarea></label><label class="field">EdgeKey 地址<input name="edgekey_base_url" value="{{values.edgekey_base_url}}"></label><label class="field">EdgeKey Token<input type="password" name="edgekey_token" placeholder="留空保留现值"></label></div></section><section class="card"><h2>SMTP 邮件</h2><div class="form-grid"><label class="field">服务器<input name="smtp_host" value="{{values.smtp_host}}"></label><label class="field">端口<input type="number" name="smtp_port" value="{{values.smtp_port or '587'}}"></label><label class="field">加密<select name="smtp_security"><option value="starttls" {% if values.smtp_security == 'starttls' %}selected{% endif %}>STARTTLS</option><option value="ssl" {% if values.smtp_security == 'ssl' %}selected{% endif %}>SSL/TLS</option><option value="none">无</option></select></label><label class="field">账号<input name="smtp_username" value="{{values.smtp_username}}"></label><label class="field">密码<input type="password" name="smtp_password" placeholder="留空保留现值"></label><label class="field">发件人<input type="email" name="smtp_from" value="{{values.smtp_from}}"></label></div></section><button class="btn">保存全部配置</button></form><section class="card test-panel"><h2>连通性测试</h2><div class="actions"><form method="post" action="/admin/settings/test/clicd"><input type="hidden" name="csrf" value="{{csrf}}"><button class="btn ghost">测试 CLICD</button></form><form method="post" action="/admin/settings/test/hashpay"><input type="hidden" name="csrf" value="{{csrf}}"><button class="btn ghost">测试 HashPay</button></form><form method="post" action="/admin/settings/test/edgekey"><input type="hidden" name="csrf" value="{{csrf}}"><button class="btn ghost">测试 EdgeKey</button></form><form class="inline" method="post" action="/admin/settings/test/smtp"><input type="hidden" name="csrf" value="{{csrf}}"><input type="email" name="recipient" required placeholder="测试收件邮箱"><button class="btn ghost">发送测试邮件</button></form></div></section></main></div></body></html>
