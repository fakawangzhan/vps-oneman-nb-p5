<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>系统配置｜VPS-ONE</title><link rel="stylesheet" href="/static/app.css"></head><body><div class="admin-shell"><aside class="sidebar"><div class="brand"><b>VPS</b>-ONE</div><nav><a href="/admin">运营总览</a><a href="/admin/products">产品控制</a><a href="/admin/plans">套餐管理</a><a class="active" href="/admin/settings">系统配置</a><a href="/">返回商城</a></nav></aside><main class="content"><div class="eyebrow">SETTINGS</div><h1>系统与集成配置</h1>{% if saved %}<div class="alert">配置已保存或测试通过</div>{% endif %}<form class="settings-stack" method="post"><input type="hidden" name="csrf" value="{{csrf}}"><section class="card"><h2>网站基础信息</h2><div class="form-grid"><label class="field">网站名称<input name="site_name" value="{{values.site_name}}"></label><label class="field">网站副标题<input name="site_tagline" value="{{values.site_tagline}}"></label><label class="field wide">站点公开地址<input type="url" name="site_url" value="{{values.site_url}}" placeholder="https://vps.example.com" required><small>全局用于 HashPay 回调与支付返回地址；保存后覆盖环境变量 BASE_URL。</small></label><label class="field wide">页脚文案<input name="site_footer" value="{{values.site_footer}}"></label></div></section><section class="card"><div class="row"><div><h2>CLICD API</h2><p class="muted">连接后可在产品控制中管理 CLICD 公开能力。</p></div><button class="btn secondary" formmethod="post" formaction="/admin/settings/test/clicd">测试连接</button></div><div class="form-grid"><label class="field wide">面板地址<input type="url" name="clicd_base_url" value="{{values.clicd_base_url}}" placeholder="https://panel.example.com"></label><label class="field wide">API Key<input type="password" name="clicd_token" placeholder="留空保留现值"></label></div></section><section class="card"><div class="row"><div><h2>HashPay 支付</h2><p class="muted">直接连接外部 HashPay 商户 API。</p></div><button class="btn secondary" formmethod="post" formaction="/admin/settings/test/hashpay">测试地址</button></div><div class="form-grid"><label class="field">HashPay 地址<input type="url" name="hashpay_base_url" value="{{values.hashpay_base_url}}" placeholder="https://pay.example.com"></label><label class="field">商户 ID<input name="hashpay_merchant_id" value="{{values.hashpay_merchant_id}}"></label><label class="field wide">商户 RSA 私钥<textarea name="hashpay_private_key" rows="6" placeholder="留空保留现值"></textarea></label><label class="field wide">HashPay RSA 公钥<textarea name="hashpay_public_key" rows="6" placeholder="留空保留现值"></textarea></label></div><div class="notice"><b>回调地址：</b><code>{{values.site_url or '请先配置站点地址'}}/hashpay/callback</code><br>HashPay 回调需携带 <code>X-HashPay-Merchant</code>，正文为 RSA-OAEP/AES-GCM 加密包。</div></section><section class="card"><h2>SMTP 邮件</h2><div class="form-grid"><label class="field">SMTP 主机<input name="smtp_host" value="{{values.smtp_host}}"></label><label class="field">端口<input name="smtp_port" value="{{values.smtp_port or '465'}}"></label><label class="field">安全<select name="smtp_security"><option value="ssl" {% if values.smtp_security=='ssl' %}selected{% endif %}>SSL</option><option value="starttls" {% if values.smtp_security=='starttls' %}selected{% endif %}>STARTTLS</option><option value="none">无</option></select></label><label class="field">用户名<input name="smtp_username" value="{{values.smtp_username}}"></label><label class="field">密码<input type="password" name="smtp_password" placeholder="留空保留现值"></label><label class="field">发件人<input name="smtp_from" value="{{values.smtp_from}}"></label></div></section><button class="btn" type="submit">保存全部配置</button></form></main></div></body></html>
