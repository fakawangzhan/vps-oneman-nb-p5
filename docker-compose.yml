services:
  vps-one:
    build:
      context: .
      dockerfile: Dockerfile
    image: vps-one:python
    restart: unless-stopped
    env_file: .env
    ports:
      - "${VPS_ONE_PORT:-9080}:9080"
    volumes:
      - vps_one_data:/app/data
    healthcheck:
      test: ["CMD","python","-c","import urllib.request;urllib.request.urlopen('http://127.0.0.1:9080/healthz',timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: [/tmp]

volumes:
  vps_one_data:
